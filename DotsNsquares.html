<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dots &amp; Squares</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
  html, body { height: 100%; margin: 0; font-family: 'Outfit', sans-serif; }
  .game-wrap { height: 100%; width: 100%; overflow: auto; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #cbd5e1; cursor: pointer; transition: transform 0.15s, background 0.15s; z-index: 10; position: relative; }
  .dot:hover, .dot.selected { transform: scale(1.5); background: #f1f5f9; }
  .dot.selected { box-shadow: 0 0 0 3px currentColor; }
  .h-line, .v-line { position: absolute; border-radius: 4px; transition: background 0.3s; }
  .h-line { height: 6px; }
  .v-line { width: 6px; }
  .square-fill { position: absolute; border-radius: 3px; transition: background 0.4s, opacity 0.4s; opacity: 0; }
  .square-fill.captured { opacity: 0.35; }
  @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 0.35; } }
  .square-fill.just-captured { animation: pop 0.3s ease-out forwards; }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="game-wrap bg-slate-900 flex flex-col items-center justify-center" id="app"><!-- Name Entry Screen -->
   <div id="name-screen" class="flex flex-col items-center gap-6 p-8">
    <h1 id="main-title" class="text-3xl font-extrabold text-slate-100 tracking-tight">Dots &amp; Squares</h1>
    <p class="text-slate-400 text-sm">Enter player names to begin</p>
    <div class="flex flex-col gap-4 w-72">
     <div><label for="p1-name" class="text-blue-400 font-semibold text-sm mb-1 block">Player 1 (Blue)</label> <input id="p1-name" type="text" maxlength="16" placeholder="Player 1" class="w-full px-4 py-2 rounded-lg bg-slate-800 text-slate-100 border border-blue-500/40 focus:outline-none focus:border-blue-400">
     </div>
     <div><label for="p2-name" class="text-red-400 font-semibold text-sm mb-1 block">Player 2 (Red)</label> <input id="p2-name" type="text" maxlength="16" placeholder="Player 2" class="w-full px-4 py-2 rounded-lg bg-slate-800 text-slate-100 border border-red-500/40 focus:outline-none focus:border-red-400">
     </div><button id="start-btn" class="mt-2 px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-xl transition-colors text-lg">Start Game</button>
    </div>
   </div><!-- Game Screen -->
   <div id="game-screen" class="hidden flex flex-col items-center gap-3 p-4 w-full">
    <div class="flex items-center justify-between w-full max-w-2xl px-2">
     <div id="p1-info" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-blue-500/15 border border-blue-500/30"><span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span> <span id="p1-label" class="text-blue-300 font-semibold text-sm"></span> <span id="p1-score" class="text-blue-100 font-extrabold text-lg ml-1">0</span>
     </div>
     <div id="turn-indicator" class="text-slate-300 font-semibold text-sm"></div>
     <div id="p2-info" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-red-500/15 border border-red-500/30"><span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span> <span id="p2-label" class="text-red-300 font-semibold text-sm"></span> <span id="p2-score" class="text-red-100 font-extrabold text-lg ml-1">0</span>
     </div>
    </div>
    <div id="board-container" class="relative" style="touch-action: manipulation;"></div>
   </div><!-- Winner Screen -->
   <div id="winner-screen" class="hidden flex flex-col items-center gap-4 p-8">
    <h2 id="winner-text" class="text-3xl font-extrabold text-slate-100"></h2>
    <p id="final-score" class="text-slate-400 text-lg"></p><button id="replay-btn" class="mt-4 px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-xl transition-colors text-lg">Play Again</button>
   </div>
  </div>
  <script>
const GRID = 12;
const CELLS = GRID - 1;
const DOT_SIZE = 14;
const GAP = 38;
const LINE_W = 6;

const defaultConfig = {
  game_title: "Dots & Squares",
  background_color: "#0f172a",
  surface_color: "#1e293b",
  text_color: "#f1f5f9",
  primary_action_color: "#10b981",
  secondary_action_color: "#64748b"
};

let players = ["Player 1", "Player 2"];
let scores = [0, 0];
let currentPlayer = 0; // 0 = P1, 1 = P2
let selectedDot = null;
const COLORS = ["#3b82f6", "#ef4444"];
const FILL_COLORS = ["#3b82f6", "#ef4444"];

// Lines: hLines[row][col] = -1 (none), 0 (P1), 1 (P2)
// hLines: GRID rows, CELLS cols (horizontal between dots)
// vLines: CELLS rows, GRID cols (vertical between dots)
let hLines, vLines, squares;

function initState() {
  hLines = Array.from({length: GRID}, () => Array(CELLS).fill(-1));
  vLines = Array.from({length: CELLS}, () => Array(GRID).fill(-1));
  squares = Array.from({length: CELLS}, () => Array(CELLS).fill(-1));
  scores = [0, 0];
  currentPlayer = 0;
  selectedDot = null;
}

function buildBoard() {
  const container = document.getElementById('board-container');
  const totalW = (GRID - 1) * GAP + DOT_SIZE;
  const totalH = (GRID - 1) * GAP + DOT_SIZE;
  container.style.width = totalW + 'px';
  container.style.height = totalH + 'px';
  container.innerHTML = '';

  // Square fills
  for (let r = 0; r < CELLS; r++) {
    for (let c = 0; c < CELLS; c++) {
      const sq = document.createElement('div');
      sq.className = 'square-fill';
      sq.id = `sq-${r}-${c}`;
      sq.style.left = (c * GAP + DOT_SIZE / 2) + 'px';
      sq.style.top = (r * GAP + DOT_SIZE / 2) + 'px';
      sq.style.width = (GAP - DOT_SIZE / 2) + 'px';
      sq.style.height = (GAP - DOT_SIZE / 2) + 'px';
      container.appendChild(sq);
    }
  }

  // Horizontal lines
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < CELLS; c++) {
      const line = document.createElement('div');
      line.className = 'h-line';
      line.id = `hl-${r}-${c}`;
      line.style.left = (c * GAP + DOT_SIZE) + 'px';
      line.style.top = (r * GAP + DOT_SIZE / 2 - LINE_W / 2) + 'px';
      line.style.width = (GAP - DOT_SIZE) + 'px';
      line.style.background = 'transparent';
      container.appendChild(line);
    }
  }

  // Vertical lines
  for (let r = 0; r < CELLS; r++) {
    for (let c = 0; c < GRID; c++) {
      const line = document.createElement('div');
      line.className = 'v-line';
      line.id = `vl-${r}-${c}`;
      line.style.left = (c * GAP + DOT_SIZE / 2 - LINE_W / 2) + 'px';
      line.style.top = (r * GAP + DOT_SIZE) + 'px';
      line.style.height = (GAP - DOT_SIZE) + 'px';
      line.style.background = 'transparent';
      container.appendChild(line);
    }
  }

  // Dots
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.id = `dot-${r}-${c}`;
      dot.style.position = 'absolute';
      dot.style.left = (c * GAP) + 'px';
      dot.style.top = (r * GAP) + 'px';
      dot.addEventListener('click', () => onDotClick(r, c));
      container.appendChild(dot);
    }
  }
}

function onDotClick(r, c) {
  if (!selectedDot) {
    selectedDot = {r, c};
    const d = document.getElementById(`dot-${r}-${c}`);
    d.classList.add('selected');
    d.style.color = COLORS[currentPlayer];
    return;
  }

  const {r: sr, c: sc} = selectedDot;
  const dr = r - sr, dc = c - sc;

  // Clear selection visual
  const prevDot = document.getElementById(`dot-${sr}-${sc}`);
  prevDot.classList.remove('selected');

  // Same dot clicked - deselect
  if (dr === 0 && dc === 0) { selectedDot = null; return; }

  // Must be adjacent (not diagonal)
  if (Math.abs(dr) + Math.abs(dc) !== 1) { selectedDot = null; return; }

  // Check if line already exists
  let lineExists = false;
  if (dr === 0) {
    // Horizontal
    const col = Math.min(sc, c);
    if (hLines[sr][col] !== -1) lineExists = true;
    else {
      hLines[sr][col] = currentPlayer;
      document.getElementById(`hl-${sr}-${col}`).style.background = COLORS[currentPlayer];
    }
  } else {
    // Vertical
    const row = Math.min(sr, r);
    if (vLines[row][sc] !== -1) lineExists = true;
    else {
      vLines[row][sc] = currentPlayer;
      document.getElementById(`vl-${row}-${sc}`).style.background = COLORS[currentPlayer];
    }
  }

  selectedDot = null;
  if (lineExists) return;

  // Check for completed squares
  let captured = 0;
  if (dr === 0) {
    const col = Math.min(sc, c);
    const row = sr;
    // Check square above (row-1, col)
    if (row > 0) captured += checkSquare(row - 1, col);
    // Check square below (row, col)
    if (row < CELLS) captured += checkSquare(row, col);
  } else {
    const row = Math.min(sr, r);
    const col = sc;
    // Check square left (row, col-1)
    if (col > 0) captured += checkSquare(row, col - 1);
    // Check square right (row, col)
    if (col < CELLS) captured += checkSquare(row, col);
  }

  if (captured > 0) {
    scores[currentPlayer] += captured;
    updateScores();
    if (scores[0] + scores[1] === CELLS * CELLS) { endGame(); return; }
    updateTurn();
    // Player goes again
  } else {
    currentPlayer = 1 - currentPlayer;
    updateTurn();
  }
}

function checkSquare(r, c) {
  if (squares[r][c] !== -1) return 0;
  // top: hLines[r][c], bottom: hLines[r+1][c], left: vLines[r][c], right: vLines[r][c+1]
  if (hLines[r][c] !== -1 && hLines[r + 1][c] !== -1 && vLines[r][c] !== -1 && vLines[r][c + 1] !== -1) {
    squares[r][c] = currentPlayer;
    const sq = document.getElementById(`sq-${r}-${c}`);
    sq.style.background = FILL_COLORS[currentPlayer];
    sq.classList.add('captured', 'just-captured');
    return 1;
  }
  return 0;
}

function updateScores() {
  document.getElementById('p1-score').textContent = scores[0];
  document.getElementById('p2-score').textContent = scores[1];
}

function updateTurn() {
  const ind = document.getElementById('turn-indicator');
  ind.textContent = `${players[currentPlayer]}'s turn`;
  ind.style.color = COLORS[currentPlayer];
  document.getElementById('p1-info').style.borderColor = currentPlayer === 0 ? '#3b82f680' : '#3b82f630';
  document.getElementById('p2-info').style.borderColor = currentPlayer === 1 ? '#ef444480' : '#ef444430';
}

function endGame() {
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('winner-screen').classList.remove('hidden');
  const wt = document.getElementById('winner-text');
  const fs = document.getElementById('final-score');
  if (scores[0] > scores[1]) {
    wt.textContent = `🎉 ${players[0]} Wins!`;
    wt.style.color = COLORS[0];
  } else if (scores[1] > scores[0]) {
    wt.textContent = `🎉 ${players[1]} Wins!`;
    wt.style.color = COLORS[1];
  } else {
    wt.textContent = "It's a Tie!";
    wt.style.color = '#f1f5f9';
  }
  fs.textContent = `${players[0]}: ${scores[0]} — ${players[1]}: ${scores[1]}`;
}

function startGame() {
  const n1 = document.getElementById('p1-name').value.trim() || 'Player 1';
  const n2 = document.getElementById('p2-name').value.trim() || 'Player 2';
  players = [n1, n2];
  initState();
  document.getElementById('name-screen').classList.add('hidden');
  document.getElementById('winner-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('p1-label').textContent = n1;
  document.getElementById('p2-label').textContent = n2;
  updateScores();
  buildBoard();
  updateTurn();
}

document.getElementById('start-btn').addEventListener('click', (e) => { e.preventDefault(); startGame(); });
document.getElementById('replay-btn').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('winner-screen').classList.add('hidden');
  document.getElementById('name-screen').classList.remove('hidden');
});

// Element SDK
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const bg = config.background_color || defaultConfig.background_color;
    const txt = config.text_color || defaultConfig.text_color;
    const primary = config.primary_action_color || defaultConfig.primary_action_color;
    const title = config.game_title || defaultConfig.game_title;
    const font = config.font_family || 'Outfit';
    const size = config.font_size || 16;

    document.querySelector('.game-wrap').style.background = bg;
    document.getElementById('main-title').textContent = title;
    document.getElementById('main-title').style.color = txt;
    document.getElementById('main-title').style.fontFamily = `${font}, Outfit, sans-serif`;
    document.getElementById('main-title').style.fontSize = `${size * 1.9}px`;
    document.getElementById('start-btn').style.background = primary;
    document.getElementById('replay-btn').style.background = primary;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({background_color: v}); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({surface_color: v}); }},
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({text_color: v}); }},
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({primary_action_color: v}); }},
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({secondary_action_color: v}); }}
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || 'Outfit', set: (v) => { config.font_family = v; window.elementSdk.setConfig({font_family: v}); }},
    fontSizeable: { get: () => config.font_size || 16, set: (v) => { config.font_size = v; window.elementSdk.setConfig({font_size: v}); }}
  }),
  mapToEditPanelValues: (config) => new Map([
    ["game_title", config.game_title || defaultConfig.game_title]
  ])
});

lucide.createIcons();
</script>
